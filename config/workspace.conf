# Multi-agent workspace configuration

# Tmux session name (override with: SESSION_NAME=myproject workspace.sh)
SESSION_NAME="${SESSION_NAME:-multiagents}"

# Working directory for all agents (defaults to current directory)
WORKSPACE_DIR="${WORKSPACE_DIR:-$(pwd)}"

# Single window name that holds all 4 panes
WINDOW_NAME="workspace"

# Pane titles (top-left, top-right, bottom-left, bottom-right)
PANE_ORCHESTRATOR="orchestrator"
PANE_DEVELOPER="developer"
PANE_TESTER="tester"
PANE_DEBUGGER="debugger"

# UI theme colors (Catppuccin Mocha-inspired dark palette)
THEME_BG="#1e1e2e"
THEME_BORDER_FG="#45475a"
THEME_ACTIVE_FG="#89b4fa"
THEME_STATUS_BG="#181825"
THEME_STATUS_FG="#cdd6f4"
